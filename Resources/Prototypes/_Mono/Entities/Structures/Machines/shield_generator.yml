# Mono shield fixture density (1x1 bounds −0.45): MS-100 / Sentinel 190; MS-250 / Aegis 300; MS-500 / Titan 450;
# LM-212 capital 550; FS-421 POI 700.
# Base
- type: entity
  id: ShieldGeneratorBase
  parent: BaseMachinePowered
  name: Shield Generator
  abstract: true
  components:
  - type: AmbientOnPowered
  - type: AmbientSound
    volume: -5
    range: 30
    enabled: false
    sound:
      path: /Audio/Ambience/Objects/anomaly_generator.ogg
  - type: Sprite
    sprite: _Mono/Structures/ShuttleComponents/shield.rsi
    snapCardinals: true
    layers:
    - state: control
    - state: control_on
      shader: unshaded
      map: ["enum.PowerDeviceVisualLayers.Powered"]
      visible: false
      color: "#FF3333"
  - type: GenericVisualizer
    visuals:
      enum.PowerDeviceVisuals.Powered:
        enum.PowerDeviceVisualLayers.Powered:
          True: { visible: true }
          False: { visible: false }
  - type: Physics
    bodyType: Static
  - type: Transform
    noRot: true
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 1500
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:ExplodeBehavior
      - !type:SpawnGasBehavior
        gasMixture:
          volume: 1000
          moles:
          - 194 # oxygen
          - 0 # nitrogen
          - 0 # carbon dioxide
          - 6 # plasma
          temperature: 752.48
    - trigger:
        !type:DamageTrigger
        damage: 1000
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetSteel1:
            min: 1
            max: 2
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: Explosive
    explosionType: Default
    maxIntensity: 4000
    intensitySlope: 4
    totalIntensity: 600
  - type: Repairable
    doAfterDelay: 8
  - type: PointLight
    enabled: false
    castShadows: true
    radius: 2
    energy: 1.5
    color: "#FF3333"
  - type: AnimationPlayer
  - type: LitOnPowered
  - type: PowerSwitch
  - type: ApcPowerReceiver
    powerLoad: 60000
  - type: Appearance
  - type: WiresPanel
  - type: WiresVisuals
  - type: ShipShieldEmitter
    damageLimit: 180000 # Forge-Change
    damageOverloadTimePunishment: 120 # Forge-Change
    healPerSecond: 1500 # Forge-Change
    damageExp: 1.05 # Forge-Change
    baseDraw: 60000 # Forge-Change
    maxDraw: 180000 # Forge-Change
    unpoweredBonus: 5 # Forge-Change
    shieldColor: "#FF3333"
    collisionResistanceMultiplier: 0.4
    powerUpSound: !type:SoundPathSpecifier
        path: "/Audio/Effects/teleport_arrival.ogg"
        params:
          pitch: 0.5
    powerDownSound: !type:SoundPathSpecifier
        path: "/Audio/Effects/teleport_departure.ogg"
        params:
          pitch: 0.5
  - type: Machine
    board: MachineShieldMS500Circuitboard
  - type: Construction
    graph: Machine
    node: machine
    containers:
    - machine_board
    - machine_parts
  - type: ContainerContainer
    containers:
      machine_board: !type:Container
      machine_parts: !type:Container
  - type: PirateBountyItem
    id: ShipShield

# T3 platform stats for guidebook protodata (abstract parents are not indexed).
- type: entity
  id: ShieldGeneratorT3Reference
  parent: ShieldGeneratorBase
  name: T3 Shield Platform (reference)
  description: Internal reference prototype for guidebook protodata. Not obtainable in round.
  suffix: Guidebook Reference
  categories: [ HideSpawnMenu ]

# POI
- type: entity
  id: ShieldGeneratorPOI
  parent: ShieldGeneratorBase
  name: FS-421 "Fortress" Outpost Shield Generator
  description: The Fortress. The latest and greatest in static, large-scale shielding.
  suffix: POI ONLY
  components:
  - type: ShipShieldEmitter
    damageLimit: 300000 # Forge-Change
    healPerSecond: 3000 # Forge-Change
    damageExp: 1
    baseDraw: 100000 # Forge-Change
    maxDraw: 300000 # Forge-Change
    unpoweredBonus: 6 # Forge-Change
    powerModifier: 0.25
    damageOverloadTimePunishment: 200
    shieldColor: "#FF9933"
    collisionResistanceMultiplier: 0.0
  - type: Sprite
    sprite: _Mono/Structures/ShuttleComponents/fobshield.rsi
    snapCardinals: true
    layers:
    - state: fobshield
    - state: fobshield_on
      shader: unshaded
      map: ["enum.PowerDeviceVisualLayers.Powered"]
      visible: false
      color: "#FF9933"
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-0.45,0.45,0.45"
        density: 700
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 1500
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:ExplodeBehavior
      - !type:SpawnGasBehavior
        gasMixture:
          volume: 1000
          moles:
          - 194 # oxygen
          - 0 # nitrogen
          - 0 # carbon dioxide
          - 6 # plasma
          temperature: 752.48
    - trigger:
        !type:DamageTrigger
        damage: 500
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetSteel1:
            min: 1
            max: 2
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: Explosive
    explosionType: Default
    maxIntensity: 4000
    intensitySlope: 4
    totalIntensity: 1000
  - type: ApcPowerReceiver
    powerLoad: 100000 # Forge-Change
  - type: PointLight
    enabled: false
    castShadows: true
    radius: 2
    energy: 1.5
    color: "#FF9933"
  # can repair it if you really want to
  - type: ShipRepairable
    repairTime: 30
    repairCost: 300

