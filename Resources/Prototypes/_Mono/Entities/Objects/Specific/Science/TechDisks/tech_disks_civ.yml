# CIV TECH DISKS - #395933
# Normal civ r&d recipes

- type: entity
  parent: TechDiskBase
  id: TechDiskBluespaceBags
  name: pre-fracture bluespace storage tech disk
  description: A disk capable of adding advanced bluespace storage to a server's recipes.
  components:
  - type: Sprite
    layers:
    - state: icon
      map: ["enum.DamageStateVisualLayers.Base"]
      color: "#d4d4d4"
    - state: label
    - state: protect
    - state: holo
      shader: unshaded
  - type: TechnologyDisk
    recipes:
    - ClothingBackpackHolding
    - ClothingBackpackSatchelHolding
    - ClothingBackpackDuffelHolding
    - ClothingBackpackMessengerHolding
    - OreBagOfHolding
    - PlantBagOfHolding
    - ConstructionBagOfHolding
    - BluespaceBeaker
    - FireExtinguisherBluespace
    - BluespaceBeaker
    - SyringeBluespace
    - JugBluespace
    - VialBluespace

