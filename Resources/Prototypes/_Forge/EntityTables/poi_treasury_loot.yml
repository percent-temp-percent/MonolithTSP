# POI treasury loot (entityTable). One random branch per tick unless amount/rolls say otherwise.
# Economy: основной доход — налог с продаж; тик — небольшое тематическое подспорье.

# --- Cash ticks (примерный эквивалент за тик, не джекпот) ---------------------

- type: entityTable
  id: PoiTreasuryLootCashTickSmall
  table: !type:GroupSelector
    children:
    - !type:EntSelector
      id: SpaceCash1000
      amount: !type:ConstantNumberSelector
        value: 5
    - !type:EntSelector
      id: SpaceCash10000
      amount: !type:ConstantNumberSelector
        value: 2

- type: entityTable
  id: PoiTreasuryLootCashTickMedium
  table: !type:GroupSelector
    children:
    - !type:EntSelector
      id: SpaceCash100
      amount: !type:ConstantNumberSelector
        value: 12
    - !type:EntSelector
      id: SpaceCash1000
      amount: !type:ConstantNumberSelector
        value: 5
    - !type:EntSelector
      id: SpaceCash10000
      amount: !type:ConstantNumberSelector
        value: 2
      weight: 0.35

- type: entityTable
  id: PoiTreasuryLootCashTickLarge
  table: !type:GroupSelector
    children:
    - !type:EntSelector
      id: SpaceCash100
      amount: !type:ConstantNumberSelector
        value: 8
    - !type:EntSelector
      id: SpaceCash1000
      amount: !type:ConstantNumberSelector
        value: 3
    - !type:EntSelector
      id: SpaceCash10000
      amount: !type:ConstantNumberSelector
        value: 5
      weight: 0.25

# Legacy aliases (часовня, свалка, био)
- type: entityTable
  id: PoiTreasuryLootCashLow
  table: !type:NestedSelector
    tableId: PoiTreasuryLootCashTickSmall

- type: entityTable
