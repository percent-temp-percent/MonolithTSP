# Faction heavy shields: same chassis tiers as FSG-420 / 470P / 600C, tuned per doctrine (tradeoffs on ShipShieldEmitter).

# --- TSFMC — regulation-grade sustained combat; pays in baseline power or lockout ---

- type: entity
  id: ShieldGeneratorForgeTSFHeavy
  parent: ShieldGeneratorFSG420
  name: TSFMC SGS-440 "Citadel" shield generator
  suffix: tier 3
  description: >-
    A TSFMC-issue heavy screen with markedly faster regeneration, a much higher overload ceiling and a gentler
    damage-power curve than civilian FSG-420—at the cost of heavy baseline and peak reactor draw.
  components:
  - type: Machine
    board: MachineShieldForgeTSFHeavyCircuitboard
  - type: ShipShieldEmitter
    shieldColor: "#48E8A8"
    healPerSecond: 138
    damageLimit: 13000
    damageExp: 1.02
    baseDraw: 51000
    maxDraw: 112000
  - type: Sprite
    sprite: Forge/Structures/Machines/shield_fsg_tier3.rsi
    snapCardinals: true
    layers:
    - state: control
    - state: control_on
      shader: unshaded
      map: ["enum.PowerDeviceVisualLayers.Powered"]
      visible: false
      color: "#48E8A8"
  - type: PointLight
    enabled: false
    castShadows: true
    radius: 2
    energy: 1.5
    color: "#48E8A8"

