# Forge: POI capture treasury entities.
# Place on POI maps next to ComputerIFFCapture (same grid, 1–2 tiles away).
# Loot pools: Resources/Prototypes/_Forge/EntityTables/poi_treasury_loot.yml
# See placement table at the bottom of this file.
#
# Excluded (no dedicated treasury): Zenith, TSFMCOutpost, NorthPole, all commented-out NF POIs.

# --- Base ---------------------------------------------------------------------

- type: entity
  parent: [BaseStructureDisableToolUse, BaseStructureIndestructible]
  id: PoiTreasury
  name: POI treasury
  description: A reinforced strongbox tied to this POI's capture console. Anyone can peek inside, but only the capture leader can withdraw.
  components:
  - type: PoiTreasury
    rewardIntervalMinutes: 10
    rewardTable: !type:NestedSelector
      tableId: PoiTreasuryLootCashLow
  - type: Transform
    anchored: true
    noRot: true
  - type: Anchorable
    flags: Unanchorable
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.40,-0.40,0.40,0.40"
        density: 1000
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: Sprite
    sprite: Structures/Storage/orebox.rsi
    state: orebox
    noRot: true
  - type: Appearance
  - type: InteractionOutline
  - type: Storage
    grid:
    - 0,0,19,9
    maxItemSize: Huge
    openOnActivate: true
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface

- type: entity
  parent: PoiTreasury
  id: PoiTreasuryDebug
  suffix: Debug
  components:
  - type: PoiTreasury
    rewardIntervalMinutes: 1
    rewardTable: !type:NestedSelector
      tableId: PoiTreasuryLootDebug

