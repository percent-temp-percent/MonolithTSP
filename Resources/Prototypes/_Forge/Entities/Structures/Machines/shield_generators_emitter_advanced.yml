# Advanced FSG emitters — use extended ShipShieldEmitter fields (linear load, passthrough, APC-scaled heal, overload scaling).
# Unlocked by ForgeFSGShieldsCivilianEmitterTech (after medium arrays).

- type: entity
  id: ShieldGeneratorFSG195L
  parent: ShieldGeneratorSmall
  name: FSG-195L "Tangent" Shield Generator
  suffix: tier 2, linear load
  description: >-
    A medium shield with a regulator stack that front-loads power cost into a linear wear term instead of a harsh exponential knee.
    Easier to budget reactors on mid-fight draw, but still hungry at the top of its envelope.
  components:
  - type: ShipShieldEmitter
    healPerSecond: 920
    damageExp: 1.03
    damageLinearLoadCoefficient: 0.085
    powerModifier: 0.48
    baseDraw: 38000
    maxDraw: 115000
    unpoweredBonus: 4.2
    damageLimit: 92000
    damageOverloadTimePunishment: 80
    shieldColor: "#4ECDC4"
    collisionResistanceMultiplier: 0.5
  - type: Sprite
    sprite: Forge/Structures/Machines/shield_fsg_tier2.rsi
    offset: 0,0.5
    snapCardinals: true
    layers:
    - state: base
    - state: panel
      map: ["enum.WiresVisualLayers.MaintenancePanel"]
    - state: light
      shader: unshaded
      map: ["enum.PowerDeviceVisualLayers.Powered"]
      visible: false
      color: "#4ECDC4"
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,-0.4,0.4,1.4"
        density: 300
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 1700
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:ExplodeBehavior
      - !type:SpawnGasBehavior
        gasMixture:
          volume: 1000
          moles:
          - 194
          - 0
          - 0
          - 6
          temperature: 752.48
    - trigger:
        !type:DamageTrigger
        damage: 700
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetSteel1:
            min: 1
            max: 2
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: Explosive
    explosionType: Default
    maxIntensity: 4000
    intensitySlope: 4
    totalIntensity: 400
  - type: ApcPowerReceiver
    powerLoad: 38000
  - type: PointLight
    enabled: false
    castShadows: true
    radius: 2
    energy: 1.5
    color: "#4ECDC4"
  - type: Machine
    board: MachineShieldFSG195LCircuitboard
  - type: Construction
    graph: Machine2x1FSG
    node: machine
    containers:
    - machine_board
    - machine_parts
  - type: ShipRepairable
    repairTime: 25
    repairCost: 185

