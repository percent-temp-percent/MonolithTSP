# Tier baselines (ShipShieldEmitter): damageLimit, healPerSecond, baseDraw, maxDraw, unpoweredBonus,
# damageOverloadTimePunishment, collisionResistanceMultiplier, ApcPowerReceiver.powerLoad
# Эталоны:
# T1 50000/500/20000/60000/3/60/0.5/20000;
# T2 100000/1000/40000/120000/4/80/0.5/40000;
# T3 180000/1800/60000/180000/5/120/0.4/60000;
# T4 300000/3000/100000/300000/6/200/0.3/100000
# T4 specialists (FSG-870R / FSG-950M): trade regen vs buffer; Anvil adds EMP/explosion damping and heavy fixture mass.
# damageExp defaults 1.05 (T1–T3), prismatic crown uses lower curve where noted.
# Construction: T1 → 1x1 (Machine); T2 → 2x1 (Machine2x1, rotate on frame); T3 → 2x2 (Machine2x2); T4 → 3x3 (Machine3x3).
# Fixtures (PhysShapeAabb bounds, density): T1 ±0.45 / 190; T2 −0.4..0.4 × −0.4..1.4 (vertical 1×2 local) / 300; T3 1.25,0.25,-0.25,-1.25 / 450; T4 2.25,0.25,-0.25,-2.25 / 700; Anvil 2.32,0.32,-0.32,-2.32 / 39500.

- type: entity
  id: ShieldGeneratorFSG90R
  parent: ShieldGeneratorSmall
  name: FSG-90R "Spark" Shield Generator
  suffix: tier 1
  description: A rapid-cycle shield generator with a light reserve and a fast return to service after overloads.
  components:
  - type: ShipShieldEmitter
    healPerSecond: 590
    damageExp: 1.06
    baseDraw: 18000
    maxDraw: 54000
    unpoweredBonus: 3.5
    damageLimit: 44000
    damageOverloadTimePunishment: 50
    shieldColor: "#58C6FF"
    collisionResistanceMultiplier: 0.6
  - type: Sprite
    sprite: Forge/Structures/Machines/shield_fsg_tier1.rsi
    snapCardinals: false
    layers:
    - state: base
    - state: panel
      map: ["enum.WiresVisualLayers.MaintenancePanel"]
    - state: light
      shader: unshaded
      map: ["enum.PowerDeviceVisualLayers.Powered"]
      visible: false
      color: "#58C6FF"
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-0.45,0.45,0.45"
        density: 190
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 1450
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:ExplodeBehavior
      - !type:SpawnGasBehavior
        gasMixture:
          volume: 1000
          moles:
          - 194
          - 0
          - 0
          - 6
          temperature: 752.48
    - trigger:
        !type:DamageTrigger
        damage: 450
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetSteel1:
            min: 1
            max: 2
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: Explosive
    explosionType: Default
    maxIntensity: 4000
    intensitySlope: 4
    totalIntensity: 280
  - type: ApcPowerReceiver
    powerLoad: 18000
  - type: PointLight
    enabled: false
    castShadows: true
    radius: 2
    energy: 1.5
    color: "#58C6FF"
  - type: Machine
    board: MachineShieldFSG90RCircuitboard
  - type: ShipRepairable
    repairTime: 18
    repairCost: 120

